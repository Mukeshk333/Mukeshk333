<svg viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f2b"/>
      <stop offset="45%" stop-color="#0e1435"/>
      <stop offset="100%" stop-color="#160b2e"/>
    </linearGradient>
    <linearGradient id="iconBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b5cff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffe1"/>
      <stop offset="100%" stop-color="#7b5cff"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e1435"/>
      <stop offset="100%" stop-color="#160b2e"/>
    </linearGradient>
    <radialGradient id="glowSpot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSpotPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#26305a" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- outer frame -->
  <rect x="4" y="4" width="1592" height="972" rx="28" fill="url(#bg)" stroke="url(#borderGlow)" stroke-width="2" opacity="0.9"/>
  <rect x="4" y="4" width="1592" height="972" rx="28" fill="url(#dots)" opacity="0.7"/>
  <circle cx="180" cy="850" r="240" fill="url(#glowSpot)"/>
  <circle cx="1400" cy="80" r="260" fill="url(#glowSpotPurple)"/>
  <rect x="0" y="0" width="140" height="8" rx="4" fill="#00e5ff" transform="translate(60,10)"/>

  <!-- header -->
  <g transform="translate(64,40)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#iconBox)"/>
    <circle cx="32" cy="24" r="10" fill="#0a1020"/>
    <path d="M14 52 a18 16 0 0 1 36 0 z" fill="#0a1020"/>
    <text x="86" y="34" font-size="42" font-weight="800" fill="#ffffff">ABOUT <tspan fill="#00d4ff">ME</tspan></text>
    <rect x="88" y="52" width="34" height="4" rx="2" fill="#00e5ff"/>
    <text x="132" y="62" font-size="19" fill="#8b93a7">Get to know me better</text>
  </g>

  <!-- LEFT: terminal card -->
  <g transform="translate(64,150)">
    <rect x="0" y="0" width="900" height="620" rx="22" fill="#0b1120" stroke="#173049" stroke-width="1.5"/>
    <rect x="0" y="0" width="900" height="620" rx="22" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>

    <!-- title bar -->
    <circle cx="34" cy="34" r="8" fill="#ff5f56"/>
    <circle cx="60" cy="34" r="8" fill="#ffbd2e"/>
    <circle cx="86" cy="34" r="8" fill="#27c93f"/>
    <text x="450" y="40" text-anchor="middle" font-family="Consolas, monospace" font-size="19" fill="#00d4ff">mukesh@portfolio:~</text>
    <line x1="24" y1="62" x2="876" y2="62" stroke="#173049" stroke-width="1.5"/>

    <!-- rows -->
    <g font-family="Consolas, monospace" font-size="20" fill="#dbe3f0">
      <!-- Name -->
      <text x="30" y="112" fill="#3ddc84">👤</text>
      <text x="70" y="112" fill="#6fd3ff">Name</text>
      <text x="230" y="112" fill="#4b5568">:</text>
      <text x="260" y="112" fill="#3ddc84" font-weight="700">Mukesh K</text>

      <!-- Role -->
      <text x="30" y="152" fill="#3ddc84">🎯</text>
      <text x="70" y="152" fill="#6fd3ff">Role</text>
      <text x="230" y="152" fill="#4b5568">:</text>
      <text x="260" y="152" fill="#3ddc84" font-weight="700">Aspiring SOC Analyst</text>

      <!-- Education -->
      <text x="30" y="192" fill="#3ddc84">🎓</text>
      <text x="70" y="192" fill="#6fd3ff">Education</text>
      <text x="230" y="192" fill="#4b5568">:</text>
      <text x="260" y="192" fill="#e7ecf5">B.E CSE (Cyber Security), 2023 - 2027</text>

      <!-- College -->
      <text x="30" y="232" fill="#3ddc84">🏛</text>
      <text x="70" y="232" fill="#6fd3ff">College</text>
      <text x="230" y="232" fill="#4b5568">:</text>
      <text x="260" y="232" fill="#e7ecf5">Dr. Mahalingam College of Engg &amp; Tech</text>

      <!-- CGPA -->
      <text x="30" y="272" fill="#3ddc84">📈</text>
      <text x="70" y="272" fill="#6fd3ff">CGPA</text>
      <text x="230" y="272" fill="#4b5568">:</text>
      <text x="260" y="272" fill="#3ddc84" font-weight="700">8.746 / 10</text>

      <!-- Focus -->
      <text x="30" y="312" fill="#3ddc84">🛡</text>
      <text x="70" y="312" fill="#6fd3ff">Focus</text>
      <text x="230" y="312" fill="#4b5568">:</text>
      <circle cx="270" cy="345" r="3.5" fill="#6fd3ff"/>
      <text x="284" y="350" fill="#c8d1e0" font-size="18">Security Monitoring</text>
      <circle cx="270" cy="378" r="3.5" fill="#6fd3ff"/>
      <text x="284" y="383" fill="#c8d1e0" font-size="18">SIEM &amp; Log Analysis</text>
      <circle cx="270" cy="411" r="3.5" fill="#6fd3ff"/>
      <text x="284" y="416" fill="#c8d1e0" font-size="18">Threat Detection &amp; Incident Response</text>
      <circle cx="270" cy="444" r="3.5" fill="#6fd3ff"/>
      <text x="284" y="449" fill="#c8d1e0" font-size="18">Vulnerability Assessment &amp; Pentesting</text>

      <!-- Motto -->
      <text x="30" y="500" fill="#c084fc" font-size="22">❝</text>
      <text x="70" y="500" fill="#6fd3ff">Motto</text>
      <text x="230" y="500" fill="#4b5568">:</text>
      <text x="260" y="500" fill="#e7ecf5" font-style="italic" font-size="18">When you want something, all the</text>
      <text x="260" y="530" fill="#e7ecf5" font-style="italic" font-size="18">universe conspires to help you achieve it.</text>
    </g>
  </g>

  <!-- RIGHT: illustration panel -->
  <g transform="translate(984,150)">
    <rect x="0" y="0" width="552" height="440" rx="22" fill="url(#rightPanel)" stroke="#2a1a4d" stroke-width="1.5"/>
    <circle cx="140" cy="120" r="140" fill="url(#glowSpot)"/>
    <circle cx="420" cy="300" r="150" fill="url(#glowSpotPurple)"/>

    <!-- floating code tag -->
    <text x="430" y="70" font-family="Consolas, monospace" font-size="34" fill="#00e5ff" filter="url(#soft)" opacity="0.9">&lt;/&gt;</text>

    <!-- monitors -->
    <g opacity="0.9">
      <rect x="60" y="90" width="90" height="60" rx="6" fill="#0a1225" stroke="#00e5ff" stroke-width="1.2"/>
      <line x1="70" y1="105" x2="130" y2="105" stroke="#3ddc84" stroke-width="2"/>
      <line x1="70" y1="115" x2="115" y2="115" stroke="#3ddc84" stroke-width="2"/>
      <line x1="70" y1="125" x2="125" y2="125" stroke="#3ddc84" stroke-width="2"/>

      <rect x="400" y="130" width="90" height="60" rx="6" fill="#0a1225" stroke="#c084fc" stroke-width="1.2"/>
      <line x1="410" y1="145" x2="470" y2="145" stroke="#3ddc84" stroke-width="2"/>
      <line x1="410" y1="155" x2="450" y2="155" stroke="#3ddc84" stroke-width="2"/>
      <line x1="410" y1="165" x2="460" y2="165" stroke="#3ddc84" stroke-width="2"/>
    </g>

    <!-- three main desk monitors -->
    <g transform="translate(115,150)">
      <rect x="0" y="0" width="90" height="130" rx="6" fill="#0a1225" stroke="#00e5ff" stroke-width="1.5"/>
      <g font-family="Consolas, monospace" font-size="8" fill="#3ddc84">
        <text x="8" y="20">$ scan --host</text>
        <text x="8" y="35">status: alert</text>
        <text x="8" y="50">port 443 open</text>
        <text x="8" y="65">CVE-2024-xxx</text>
        <text x="8" y="80">log ingest OK</text>
      </g>

      <rect x="105" y="-15" width="120" height="160" rx="6" fill="#0a1225" stroke="#00e5ff" stroke-width="2"/>
      <g font-family="Consolas, monospace" font-size="9" fill="#00e5ff">
        <text x="115" y="8">SOC DASHBOARD</text>
        <text x="115" y="26" fill="#3ddc84">▓▓▓▓░░░ 74%</text>
        <text x="115" y="44" fill="#f87171">! anomaly detected</text>
        <text x="115" y="62" fill="#c8d1e0">traffic: 1.2k req/s</text>
        <text x="115" y="80" fill="#3ddc84">firewall: active</text>
        <text x="115" y="98" fill="#c8d1e0">threat lvl: low</text>
      </g>

      <rect x="240" y="10" width="90" height="120" rx="6" fill="#0a1225" stroke="#c084fc" stroke-width="1.5"/>
      <g font-family="Consolas, monospace" font-size="8" fill="#c084fc">
        <text x="248" y="30">packet trace</text>
        <text x="248" y="45" fill="#c8d1e0">10.0.0.4 -&gt; .21</text>
        <text x="248" y="60" fill="#c8d1e0">SYN / ACK</text>
        <text x="248" y="75" fill="#3ddc84">handshake OK</text>
      </g>
    </g>

    <!-- hoodie silhouette, back view, seated -->
    <g transform="translate(200,205)">
      <ellipse cx="60" cy="185" rx="72" ry="16" fill="#00e5ff" opacity="0.12" filter="url(#soft)"/>
      <path d="M10 190 Q0 110 30 80 Q60 55 90 80 Q120 110 110 190 Z" fill="#111528" stroke="#00e5ff" stroke-width="1.2"/>
      <circle cx="60" cy="45" r="26" fill="#141a30" stroke="#c084fc" stroke-width="1.2"/>
      <path d="M34 40 Q60 12 86 40 L86 55 Q60 30 34 55 Z" fill="#0d1120"/>
      <rect x="28" y="150" width="64" height="14" rx="6" fill="#0a0e1c"/>
    </g>

    <!-- desk line + mugs -->
    <line x1="20" y1="365" x2="530" y2="365" stroke="#2a3550" stroke-width="2"/>
    <path d="M40 350 h20 v14 a10 8 0 0 1 -20 0 z" fill="none" stroke="#f4c04d" stroke-width="1.5"/>
    <path d="M490 350 h20 v14 a10 8 0 0 1 -20 0 z" fill="none" stroke="#f4c04d" stroke-width="1.5"/>

    <!-- falling binary -->
    <g font-family="Consolas, monospace" font-size="11" fill="#00e5ff" opacity="0.35">
      <text x="500" y="60">01</text><text x="500" y="80">10</text><text x="500" y="100">11</text>
      <text x="520" y="40">10</text><text x="520" y="60">01</text><text x="520" y="80">00</text>
    </g>

    <!-- feature badges strip -->
    <g transform="translate(0,470)">
      <g transform="translate(20,0)" text-anchor="middle">
        <circle cx="45" cy="0" r="28" fill="#0d1a33" stroke="#00d4ff" stroke-width="1.5"/>
        <text x="45" y="8" font-size="22">🚀</text>
        <text x="45" y="52" font-size="15" fill="#eaeef7" font-weight="700">Passion</text>
        <text x="45" y="72" font-size="12" fill="#8b93a7">Cyber Security</text>
      </g>
      <g transform="translate(155,0)" text-anchor="middle">
        <circle cx="45" cy="0" r="28" fill="#0d1a33" stroke="#3ddc84" stroke-width="1.5"/>
        <text x="45" y="8" font-size="22">🎯</text>
        <text x="45" y="52" font-size="15" fill="#eaeef7" font-weight="700">Goal</text>
        <text x="45" y="72" font-size="12" fill="#8b93a7">SOC Expert</text>
      </g>
      <g transform="translate(290,0)" text-anchor="middle">
        <circle cx="45" cy="0" r="28" fill="#0d1a33" stroke="#c084fc" stroke-width="1.5"/>
        <text x="45" y="8" font-size="22">🧠</text>
        <text x="45" y="52" font-size="15" fill="#eaeef7" font-weight="700">Learning</text>
        <text x="45" y="72" font-size="12" fill="#8b93a7">Everyday</text>
      </g>
      <g transform="translate(425,0)" text-anchor="middle">
        <circle cx="45" cy="0" r="28" fill="#0d1a33" stroke="#f4c04d" stroke-width="1.5"/>
        <text x="45" y="8" font-size="22">🛡</text>
        <text x="45" y="52" font-size="15" fill="#f4c04d" font-weight="700">Mindset</text>
        <text x="45" y="72" font-size="11" fill="#8b93a7">Secure. Learn. Grow.</text>
      </g>
    </g>
  </g>

  <!-- quote bar -->
  <g transform="translate(64,830)">
    <rect x="0" y="0" width="1472" height="110" rx="55" fill="#0b1120" stroke="#00d4ff" stroke-width="1.2" opacity="0.9"/>
    <text x="40" y="72" font-size="60" fill="#00e5ff" opacity="0.6" font-family="Georgia, serif">&#8220;</text>
    <text x="736" y="63" text-anchor="middle" font-size="24" fill="#e7ecf5" font-style="italic">
      "When you want something, all the universe conspires to help you achieve it."
    </text>
    <text x="1400" y="95" font-size="60" fill="#00e5ff" opacity="0.6" font-family="Georgia, serif">&#8221;</text>
  </g>
</svg>
