<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pulseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1330"/>
      <stop offset="100%" stop-color="#0a0f28"/>
    </linearGradient>
  </defs>

  <!-- pulsing glow ring -->
  <circle cx="60" cy="60" r="30" fill="url(#pulseGlow)">
    <animate attributeName="r" values="28;46;28" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <!-- icon box -->
  <rect x="24" y="24" width="72" height="72" rx="18" fill="url(#boxBg)" stroke="#00d4ff" stroke-width="2"/>

  <!-- terminal glyph -->
  <path d="M40 46 L52 60 L40 74" fill="none" stroke="#00d4ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="58" y1="74" x2="80" y2="74" stroke="#00d4ff" stroke-width="4" stroke-linecap="round"/>

  <!-- online dot -->
  <circle cx="88" cy="32" r="7" fill="#3ddc84" stroke="#0a0f28" stroke-width="2.5"/>
</svg>
