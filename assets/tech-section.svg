<svg viewBox="0 0 1600 1080" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f2b"/>
      <stop offset="45%" stop-color="#0e1435"/>
      <stop offset="100%" stop-color="#160b2e"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4fd8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff4fd8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7fdcff"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#26305a" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- shared background -->
  <rect x="0" y="0" width="1600" height="1080" rx="26" fill="url(#pageBg)"/>
  <rect x="0" y="0" width="1600" height="1080" rx="26" fill="url(#dots)"/>
  <circle cx="150" cy="120" r="260" fill="url(#glowCyan)"/>
  <circle cx="900" cy="60" r="260" fill="url(#glowPurple)"/>
  <circle cx="1450" cy="250" r="260" fill="url(#glowPink)"/>
  <circle cx="300" cy="800" r="300" fill="url(#glowPurple)"/>
  <circle cx="1300" cy="900" r="300" fill="url(#glowCyan)"/>
  <rect x="0" y="0" width="1600" height="1080" rx="26" fill="none" stroke="#2a3560" stroke-width="1.5"/>

  <!-- ===================== SECTION 1: AREAS OF INTEREST ===================== -->
  <g transform="translate(60,50)">
    <circle cx="24" cy="20" r="18" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
    <circle cx="24" cy="20" r="7" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
    <text x="58" y="30" font-size="30" font-weight="800" letter-spacing="1.5" fill="url(#titleGrad)">AREAS OF INTEREST</text>
    <rect x="0" y="46" width="130" height="4" rx="2" fill="#00d4ff"/>
    <circle cx="140" cy="48" r="4" fill="#00d4ff"/>
  </g>

  <!-- card template values -->
  <!-- Card 1: SOC (cyan) -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="336" height="270" rx="18" fill="#0d1330" fill-opacity="0.55" stroke="#0fd0ff" stroke-width="1.3"/>
    <circle cx="168" cy="70" r="46" fill="#0a1730" stroke="#00d4ff" stroke-width="2"/>
    <g transform="translate(140,44)" filter="url(#soft)">
      <rect x="0" y="0" width="56" height="38" rx="4" fill="none" stroke="#00d4ff" stroke-width="3"/>
      <rect x="22" y="38" width="12" height="10" fill="#00d4ff"/>
      <rect x="12" y="48" width="32" height="4" fill="#00d4ff"/>
      <path d="M28 10 l8 6 v10 a10 8 0 0 1 -16 0 v-10 z" fill="#00d4ff" opacity="0.9"/>
    </g>
    <text x="168" y="152" text-anchor="middle" font-size="17" font-weight="800" letter-spacing="0.5" fill="#00d4ff">SECURITY OPERATIONS CENTER</text>
    <text x="168" y="180" text-anchor="middle" font-size="14" fill="#c3c9dd">Monitoring, analyzing and</text>
    <text x="168" y="200" text-anchor="middle" font-size="14" fill="#c3c9dd">defending organizational assets</text>
    <line x1="24" y1="238" x2="90" y2="238" stroke="#233057" stroke-width="2"/>
    <circle cx="146" cy="238" r="4" fill="#00d4ff"/>
    <circle cx="164" cy="238" r="4" fill="#00d4ff"/>
    <circle cx="182" cy="238" r="4" fill="#00d4ff"/>
    <circle cx="200" cy="238" r="4" fill="#00d4ff"/>
    <line x1="246" y1="238" x2="312" y2="238" stroke="#233057" stroke-width="2"/>
  </g>

  <!-- Card 2: Threat Detection (purple) -->
  <g transform="translate(420,120)">
    <rect x="0" y="0" width="336" height="270" rx="18" fill="#150d30" fill-opacity="0.55" stroke="#a855f7" stroke-width="1.3"/>
    <circle cx="168" cy="70" r="46" fill="#160a30" stroke="#a855f7" stroke-width="2"/>
    <g transform="translate(140,42)" filter="url(#soft)">
      <path d="M28 0 L52 10 V32 C52 50 40 58 28 62 C16 58 4 50 4 32 V10 Z" fill="none" stroke="#c084fc" stroke-width="3"/>
      <line x1="28" y1="20" x2="28" y2="36" stroke="#c084fc" stroke-width="3"/>
      <circle cx="28" cy="46" r="2.5" fill="#c084fc"/>
    </g>
    <text x="168" y="152" text-anchor="middle" font-size="17" font-weight="800" letter-spacing="0.5" fill="#c084fc">THREAT DETECTION &amp; RESPONSE</text>
    <text x="168" y="180" text-anchor="middle" font-size="14" fill="#c3c9dd">Detecting threats early and</text>
    <text x="168" y="200" text-anchor="middle" font-size="14" fill="#c3c9dd">responding effectively</text>
    <line x1="24" y1="238" x2="90" y2="238" stroke="#2a2058" stroke-width="2"/>
    <circle cx="146" cy="238" r="4" fill="#c084fc"/>
    <circle cx="164" cy="238" r="4" fill="#c084fc"/>
    <circle cx="182" cy="238" r="4" fill="#c084fc"/>
    <line x1="200" y1="238" x2="312" y2="238" stroke="#2a2058" stroke-width="2"/>
  </g>

  <!-- Card 3: VAPT (green) -->
  <g transform="translate(780,120)">
    <rect x="0" y="0" width="336" height="270" rx="18" fill="#0a1f18" fill-opacity="0.55" stroke="#22e58f" stroke-width="1.3"/>
    <circle cx="168" cy="70" r="46" fill="#08160f" stroke="#22e58f" stroke-width="2"/>
    <g transform="translate(140,42)" filter="url(#soft)">
      <path d="M28 2 L52 14 V38 L28 60 L4 38 V14 Z" fill="none" stroke="#3ddc84" stroke-width="3"/>
      <path d="M4 14 L28 26 L52 14" fill="none" stroke="#3ddc84" stroke-width="2.5"/>
      <line x1="28" y1="26" x2="28" y2="60" stroke="#3ddc84" stroke-width="2.5"/>
    </g>
    <text x="168" y="152" text-anchor="middle" font-size="17" font-weight="800" letter-spacing="0.5" fill="#3ddc84">VAPT</text>
    <text x="168" y="180" text-anchor="middle" font-size="14" fill="#c3c9dd">Finding vulnerabilities and</text>
    <text x="168" y="200" text-anchor="middle" font-size="14" fill="#c3c9dd">securing applications</text>
    <line x1="24" y1="238" x2="90" y2="238" stroke="#1c3a2c" stroke-width="2"/>
    <circle cx="146" cy="238" r="4" fill="#3ddc84"/>
    <circle cx="164" cy="238" r="4" fill="#3ddc84"/>
    <circle cx="182" cy="238" r="4" fill="#3ddc84"/>
    <circle cx="200" cy="238" r="4" fill="#3ddc84"/>
    <line x1="246" y1="238" x2="312" y2="238" stroke="#1c3a2c" stroke-width="2"/>
  </g>

  <!-- Card 4: Incident Response (orange) -->
  <g transform="translate(1140,120)">
    <rect x="0" y="0" width="336" height="270" rx="18" fill="#241206" fill-opacity="0.55" stroke="#ffa733" stroke-width="1.3"/>
    <circle cx="168" cy="70" r="46" fill="#1a0f04" stroke="#ffa733" stroke-width="2"/>
    <g transform="translate(140,42)" filter="url(#soft)">
      <circle cx="28" cy="28" r="24" fill="none" stroke="#ffb454" stroke-width="3"/>
      <circle cx="28" cy="28" r="13" fill="none" stroke="#ffb454" stroke-width="3"/>
      <circle cx="28" cy="28" r="3" fill="#ffb454"/>
      <line x1="28" y1="0" x2="28" y2="10" stroke="#ffb454" stroke-width="3"/>
      <line x1="28" y1="46" x2="28" y2="56" stroke="#ffb454" stroke-width="3"/>
      <line x1="0" y1="28" x2="10" y2="28" stroke="#ffb454" stroke-width="3"/>
      <line x1="46" y1="28" x2="56" y2="28" stroke="#ffb454" stroke-width="3"/>
    </g>
    <text x="168" y="152" text-anchor="middle" font-size="17" font-weight="800" letter-spacing="0.5" fill="#ffb454">INCIDENT RESPONSE</text>
    <text x="168" y="180" text-anchor="middle" font-size="14" fill="#c3c9dd">Handling security incidents and</text>
    <text x="168" y="200" text-anchor="middle" font-size="14" fill="#c3c9dd">minimizing impact</text>
    <line x1="24" y1="238" x2="90" y2="238" stroke="#3a2a10" stroke-width="2"/>
    <circle cx="146" cy="238" r="4" fill="#ffb454"/>
    <circle cx="164" cy="238" r="4" fill="#ffb454"/>
    <circle cx="182" cy="238" r="4" fill="#ffb454"/>
    <line x1="200" y1="238" x2="312" y2="238" stroke="#3a2a10" stroke-width="2"/>
  </g>

  <!-- ===================== SECTION 2: TECH ARSENAL ===================== -->
  <g transform="translate(60,430)">
    <g transform="translate(6,10)">
      <circle cx="16" cy="16" r="16" fill="none" stroke="#c084fc" stroke-width="2.5"/>
      <circle cx="16" cy="16" r="5" fill="none" stroke="#c084fc" stroke-width="2.5"/>
      <line x1="16" y1="0" x2="16" y2="4" stroke="#c084fc" stroke-width="2.5"/>
      <line x1="16" y1="28" x2="16" y2="32" stroke="#c084fc" stroke-width="2.5"/>
      <line x1="0" y1="16" x2="4" y2="16" stroke="#c084fc" stroke-width="2.5"/>
      <line x1="28" y1="16" x2="32" y2="16" stroke="#c084fc" stroke-width="2.5"/>
    </g>
    <text x="52" y="32" font-size="30" font-weight="800" letter-spacing="1.5" fill="url(#titleGrad2)">TECH ARSENAL</text>
    <rect x="0" y="48" width="90" height="4" rx="2" fill="#00d4ff"/>
