    <!-- event viewer pill centered -->
    <g transform="translate(600,410)" font-size="17" font-weight="700">
      <rect width="280" height="66" rx="14" fill="#061a30" stroke="#4b9fe1" stroke-width="1.5"/>
      <rect x="24" y="20" width="26" height="26" rx="5" fill="none" stroke="#4b9fe1" stroke-width="2.5"/>
      <line x1="24" y1="28" x2="50" y2="28" stroke="#4b9fe1" stroke-width="2"/>
