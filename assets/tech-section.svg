    <text x="740" y="52" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="2" fill="#eaf2ff">LANGUAGES</text>
    <circle cx="700" cy="46" r="3" fill="#00d4ff"/>
    <circle cx="782" cy="46" r="3" fill="#00d4ff"/>
    <line x1="782" y1="46" x2="1010" y2="46" stroke="#284066" stroke-width="1.5"/>

    <!-- language badges -->
    <g font-size="13" fill="#c3c9dd" text-anchor="middle" font-weight="600">
      <g transform="translate(200,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#0e1a3a" stroke="#3572A5" stroke-width="1.5" transform="rotate(0)"/>
        <path d="M45 22c-13 0-13 6-13 6v8h13v2H24s-8 1-8 14 7 13 7 13h4v-9s0-8 8-8h11s8 0 8-8V29s1-7-9-7zm-7 6a3 3 0 110 6 3 3 0 010-6z" fill="#3776AB" transform="translate(9,10) scale(0.85)"/>
        <path d="M45 68c13 0 13-6 13-6v-8H45v-2h21s8-1 8-14-7-13-7-13h-4v9s0 8-8 8H44s-8 0-8 8v14s-1 7 9 7zm7-6a3 3 0 110-6 3 3 0 010 6z" fill="#FFD43B" transform="translate(9,10) scale(0.85)"/>
        <text x="45" y="112" fill="#eaf2ff">Python</text>
      </g>
      <g transform="translate(340,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#160f08" stroke="#E76F00" stroke-width="1.5"/>
        <path d="M30 55c-3 5 3 9 12 9 14 0 22-6 22-12 0-4-4-6-8-7 6 1 12 3 12 8 0 8-11 14-26 14-11 0-16-5-12-12z" fill="#E76F00" transform="translate(8,4)"/>
        <path d="M43 15c-6 6 8 10 0 18 0 0 12-6 6-14-5-7-6-4-6-4z" fill="#5382A1" transform="translate(8,4)"/>
        <ellipse cx="45" cy="42" rx="18" ry="4" fill="none" stroke="#5382A1" stroke-width="1.5" transform="translate(0,4)"/>
        <text x="45" y="112" fill="#eaf2ff">Java</text>
      </g>
      <g transform="translate(480,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#0a1830" stroke="#4b9fe1" stroke-width="1.5"/>
        <circle cx="45" cy="45" r="22" fill="none" stroke="#4b9fe1" stroke-width="4"/>
        <text x="45" y="53" text-anchor="middle" font-size="26" font-weight="800" fill="#4b9fe1">C</text>
        <text x="45" y="112" fill="#eaf2ff">C</text>
      </g>
      <g transform="translate(620,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#0a1830" stroke="#4b9fe1" stroke-width="1.5"/>
        <circle cx="45" cy="45" r="22" fill="none" stroke="#4b9fe1" stroke-width="4"/>
        <text x="45" y="53" text-anchor="middle" font-size="20" font-weight="800" fill="#4b9fe1">C++</text>
        <text x="45" y="112" fill="#eaf2ff">C / C++</text>
      </g>
      <g transform="translate(760,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#241d05" stroke="#F0DB4F" stroke-width="1.5"/>
        <text x="45" y="58" text-anchor="middle" font-size="30" font-weight="800" fill="#F0DB4F">JS</text>
        <text x="45" y="112" fill="#eaf2ff">JavaScript</text>
      </g>
      <g transform="translate(900,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#2a0f06" stroke="#E44D26" stroke-width="1.5"/>
        <text x="45" y="58" text-anchor="middle" font-size="26" font-weight="800" fill="#E44D26">5</text>
        <text x="45" y="112" fill="#eaf2ff">HTML5</text>
      </g>
      <g transform="translate(1040,90)">
        <rect x="0" y="0" width="90" height="90" rx="14" fill="#06152a" stroke="#2965F1" stroke-width="1.5"/>
        <text x="45" y="58" text-anchor="middle" font-size="26" font-weight="800" fill="#2965F1">3</text>
        <text x="45" y="112" fill="#eaf2ff">CSS3</text>
      </g>
    </g>

    <!-- SOC tools label -->
    <line x1="470" y1="270" x2="640" y2="270" stroke="#284066" stroke-width="1.5"/>
    <text x="740" y="276" text-anchor="middle" font-size="19" font-weight="700" letter-spacing="2" fill="#eaf2ff">SOC / SECURITY TOOLS</text>
    <line x1="855" y1="270" x2="1010" y2="270" stroke="#284066" stroke-width="1.5"/>

    <!-- tool pills row 1 -->
    <g font-size="16" font-weight="700" text-anchor="start">
      <g transform="translate(60,300)">
        <rect width="180" height="70" rx="12" fill="#07200f" stroke="#3ddc84" stroke-width="1.5"/>
        <path d="M26 22 L46 35 L26 48 Z" fill="#3ddc84"/>
        <text x="62" y="42" fill="#3ddc84">SPLUNK</text>
      </g>
      <g transform="translate(260,300)">
        <rect width="180" height="70" rx="12" fill="#061a2e" stroke="#4b9fe1" stroke-width="1.5"/>
        <circle cx="36" cy="35" r="14" fill="none" stroke="#4b9fe1" stroke-width="2.5"/>
        <path d="M30 32 L36 38 L44 28" fill="none" stroke="#4b9fe1" stroke-width="2.5"/>
        <text x="62" y="42" fill="#4b9fe1">WAZUH</text>
      </g>
      <g transform="translate(460,300)">
        <rect width="180" height="70" rx="12" fill="#071f31" stroke="#2fa7e0" stroke-width="1.5"/>
        <path d="M22 42 Q36 16 50 42 Q36 34 22 42Z" fill="#2fa7e0"/>
        <text x="62" y="42" fill="#2fa7e0">WIRESHARK</text>
      </g>
      <g transform="translate(660,300)">
        <rect width="180" height="70" rx="12" fill="#2a1704" stroke="#ffa733" stroke-width="1.5"/>
        <path d="M34 18 L22 40 H32 L28 52 L48 30 H36 Z" fill="#ffa733"/>
        <text x="62" y="42" fill="#ffa733">BURP SUITE</text>
      </g>
      <g transform="translate(860,300)">
        <rect width="180" height="70" rx="12" fill="#06251a" stroke="#22e58f" stroke-width="1.5"/>
        <ellipse cx="36" cy="35" rx="16" ry="10" fill="none" stroke="#22e58f" stroke-width="2.5"/>
        <circle cx="36" cy="35" r="4" fill="#22e58f"/>
        <text x="62" y="42" fill="#22e58f">NMAP</text>
      </g>
      <g transform="translate(1060,300)">
        <rect width="200" height="70" rx="12" fill="#071c30" stroke="#4b9fe1" stroke-width="1.5"/>
        <rect x="24" y="20" width="24" height="30" rx="4" fill="none" stroke="#4b9fe1" stroke-width="2.5"/>
        <text x="36" y="42" text-anchor="middle" font-size="16" fill="#4b9fe1">M</text>
        <text x="62" y="42" fill="#4b9fe1">METASPLOIT</text>
      </g>
      <g transform="translate(1280,300)">
        <rect width="160" height="70" rx="12" fill="#1c0a2a" stroke="#c084fc" stroke-width="1.5"/>
        <path d="M30 20 Q22 35 30 50 Q26 35 34 20Z" fill="#c084fc"/>
        <text x="56" y="42" fill="#c084fc">KALI LINUX</text>
