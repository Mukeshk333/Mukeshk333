<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Fira Code', monospace">
  <defs>
    <linearGradient id="winBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f28"/>
      <stop offset="100%" stop-color="#0d1330"/>
    </linearGradient>
    <linearGradient id="glowBorder" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="ambient1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="120" cy="60" r="180" fill="url(#ambient1)"/>
  <circle cx="1080" cy="280" r="200" fill="url(#ambient2)"/>

  <rect x="24" y="24" width="1152" height="292" rx="18" fill="#000000" opacity="0.35"/>
  <rect x="16" y="16" width="1152" height="292" rx="18" fill="url(#winBg)" stroke="url(#glowBorder)" stroke-width="1.6"/>

  <rect x="16" y="16" width="1152" height="46" rx="18" fill="#0d1330"/>
  <rect x="16" y="44" width="1152" height="18" fill="#0d1330"/>
  <circle cx="46" cy="39" r="7" fill="#ff5f56"/>
  <circle cx="70" cy="39" r="7" fill="#ffbd2e"/>
  <circle cx="94" cy="39" r="7" fill="#27c93f"/>
  <text x="592" y="44" text-anchor="middle" font-size="13.5" fill="#7fdcff" letter-spacing="0.5">mukesh@portfolio: ~</text>
  <text x="1112" y="44" text-anchor="end" font-size="13" fill="#3ddc84">● online</text>

  <g transform="translate(46,90)" font-size="16" fill="#dbe3f0">
    <text x="0" y="0" fill="#00d4ff" font-weight="700">Mukesh K — SOC Terminal  <tspan fill="#3ddc84" font-size="13">v1.0</tspan></text>
    <text x="0" y="28" fill="#f4c04d" font-size="14">Tap a command below to see its output.</text>

    <text x="0" y="66"><tspan fill="#7d87a3">mukesh@portfolio:~$</tspan> <tspan fill="#eaf2ff">help</tspan></text>
    <text x="0" y="90" fill="#c3c9dd" font-size="14">whoami · about · education · skills · projects · certifications · achievements · contact · sudo hire-me</text>

    <text x="0" y="130"><tspan fill="#7d87a3">mukesh@portfolio:~$</tspan> <tspan fill="#eaf2ff"></tspan></text>
    <rect x="168" y="116" width="9" height="18" fill="#00d4ff" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
